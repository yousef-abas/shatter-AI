<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #030712; color: #f3f4f6; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-8 bg-gradient-to-b from-slate-950 to-slate-900">

    <main class="w-full max-w-3xl space-y-8 z-10 my-auto text-center">
        
        <!-- اللوجو -->
        <div id="logo-zone">
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400">
                SHATTER SEARCH
            </h1>
            <p class="text-xs text-indigo-400 font-bold mt-2">اكتب سؤالك والرد هيطلعلك بالبلدي في ثانية</p>
        </div>

        <!-- شريط البحث -->
        <div class="w-full glass rounded-2xl p-2 shadow-2xl">
            <div class="flex items-center gap-2">
                <input type="text" id="searchInput" placeholder="اسأل عن كود، داتا، مبيعات، أو أي حاجة يا حبيب أخوك..." 
                    class="w-full bg-transparent py-4 px-4 outline-none text-sm md:text-base text-white placeholder-slate-500 font-medium text-right">
                <button onclick="executeSearch()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-xl text-xs md:text-sm font-bold transition-all whitespace-nowrap">
                    بحث فوري 🚀
                </button>
            </div>
        </div>

        <!-- صندوق النتائج -->
        <div id="resultContainer" class="w-full hidden text-right">
            <div class="glass rounded-2xl p-6 md:p-8 shadow-xl">
                <p class="text-xs font-bold text-indigo-400 mb-4 border-b border-white/5 pb-2">💡 الرد الفوري:</p>
                <div id="responseText" class="text-sm md:text-base text-slate-200 leading-relaxed"></div>
            </div>
        </div>

    </main>

    <script>
        function executeSearch() {
            var query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert("اكتب حاجة الأول في مربع البحث يا صاحبي! 😉");
                return;
            }

            // إظهار صندوق النتائج
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('responseText').innerHTML = "بص بقا.. جاري الفلترة والرد الفوري...";

            // الكلمات المفتاحية والردود البسيطة
            var q = query.toLowerCase();
            var reply = "بص يا حبيب أخوك، سؤالك جامد بس أنا متبرمج محلياً دلوقتي عشان أساعدك في الأكواد والتصميم وقواعد البيانات (زي SQL و JavaScript و Tailwind). <br><br>جرب اكتب كلمة زي (SQL) أو (كود) أو (تصميم) وشوف العظمة!";

            if (q.includes("sql") || q.includes("قاعدة") || q.includes("جدول")) {
                reply = "بص بقا يا صاحبي، عشان تعمل استعلام SQL محترم يفلتر لك البيانات، الترتيب بيكون كدا:<br><pre class='bg-slate-950 p-4 rounded-xl text-indigo-300 font-mono text-xs my-2 text-left select-all overflow-x-auto'>SELECT item_id, status FROM inventory_levels WHERE status = 'In Stock';</pre>الـ WHERE بتفلتر الداتا والـ SELECT بتجيب العواميد اللي أنت عايزها بالظبط.";
            } 
            else if (q.includes("جافا") || q.includes("javascript") || q.includes("كود")) {
                reply = "يا صاحبي الـ JavaScript هي أساس اللعبة! نصيحة برمجية على السريع: ابعد عن استخدام var تماماً في كودك، واشتغل دايماً بـ const للحاجات الثابتة و let للمتغيرات عشان كودك يكون نظيف ومفهوش أخطاء.";
            } 
            else if (q.includes("تصميم") || q.includes("tailwind") || q.includes("واجهة")) {
                reply = "عايز واجهة فخمة؟ ركز معايا يا حبيب أخوك! عشان تعمل التأثير الزجاجي الشفاف بـ Tailwind CSS حط الكود ده في الـ Class:<br><code class='text-indigo-400 bg-slate-950 px-2 py-1 rounded font-mono text-xs'>bg-white/5 backdrop-blur-md border border-white/10</code>";
            } 
            else if (q.includes("سلام") || q.includes("ازيك") || q.includes("مرحبا") || q.includes("الو")) {
                reply = "يا مرحب بحبيب أخوك! 😎 منور محرك بحث Shatter. قول لي بقا، إيه اللي واقف معاك النهاردة وعايزنا نظبطه سوا؟ اكتب سؤالك وعينيا ليك!";
            }

            // عرض النتيجة فوراً بدون أي تأخير
            document.getElementById('responseText').innerHTML = reply;
        }

        // تشغيل بالـ Enter من الكيبورد
        document.getElementById('searchInput').addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                executeSearch();
            }
        });
    </script>
</body>
</html>
