<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Search | المحادثة الفورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #030712; color: #f3f4f6; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .chat-container { height: calc(100vh - 180px); }
        .msg-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 bg-gradient-to-b from-slate-950 to-slate-900 min-h-screen relative">

    <!-- الواجهة الأولى: شاشة البحث الرئيسية -->
    <div id="searchMode" class="w-full max-w-3xl my-auto space-y-8 text-center">
        <div>
            <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400 tracking-wider">
                SHATTER SEARCH
            </h1>
            <p class="text-xs text-indigo-400 font-bold mt-3 tracking-[0.2em] uppercase">ابدأ البحث وهيتحول لشات ذكي فوراً</p>
        </div>

        <div class="w-full glass rounded-2xl p-2 shadow-2xl">
            <div class="flex items-center gap-2">
                <input type="text" id="mainSearchInput" placeholder="اسأل عن أي حاجة في الكون يا حبيب أخوك..." 
                    class="w-full bg-transparent py-4 px-4 outline-none text-sm md:text-base text-white placeholder-slate-500 font-medium text-right">
                <button onclick="startChatMode()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-xl text-xs md:text-sm font-bold transition-all whitespace-nowrap">
                    اسأل الذكاء 🚀
                </button>
            </div>
        </div>
    </div>

    <!-- الواجهة الثانية: شاشة الشات والمحادثة -->
    <div id="chatMode" class="w-full max-w-4xl hidden flex-col justify-between flex-grow h-screen msg-fade">
        <header class="w-full flex justify-between items-center py-3 border-b border-white/5 mb-2">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <h2 class="text-sm font-bold text-slate-200">جلسة محادثة حية مع Shatter AI</h2>
            </div>
            <button onclick="resetToSearch()" class="text-xs text-slate-500 hover:text-indigo-400 transition-all bg-slate-900 px-3 py-1.5 rounded-lg border border-white/5">
                🔄 بحث جديد
            </button>
        </header>

        <div id="chatMessages" class="chat-container w-full overflow-y-auto space-y-4 p-2 flex flex-col">
            <!-- الرسائل هتنزل هنا -->
        </div>

        <footer class="w-full bg-slate-950/40 p-2 rounded-xl border border-white/5 shadow-2xl mt-2">
            <div class="flex items-center gap-2">
                <input type="text" id="chatInput" placeholder="اكتب ردك أو سؤالك التاني هنا يا صاحبي..." 
                    class="w-full bg-transparent py-3 px-4 outline-none text-sm text-white placeholder-slate-500">
                <button onclick="sendChatMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-lg text-xs font-bold transition-all whitespace-nowrap">
                    إرسال 🕊️
                </button>
            </div>
        </footer>
    </div>

    <script>
        // التحول الفوري لشاشة الشات بمجرد الضغط
        function startChatMode() {
            var query = document.getElementById('mainSearchInput').value.trim();
            if (!query) {
                alert("اكتب سؤالك الأول يا صاحبي! 😉");
                return;
            }

            // التبديل الفوري للواجهات غصب عن السيرفر
            document.getElementById('searchMode').classList.add('hidden');
            var chatMode = document.getElementById('chatMode');
            chatMode.classList.remove('hidden');
            chatMode.classList.add('flex');

            // طباعة سؤال المستخدم فوراً
            appendMessage('user', query);
            
            // طلب الرد من الذكاء
            fetchAIResponse(query);
            document.getElementById('mainSearchInput').value = "";
        }

        function sendChatMessage() {
            var query = document.getElementById('chatInput').value.trim();
            if (!query) return;

            appendMessage('user', query);
            document.getElementById('chatInput').value = "";
            fetchAIResponse(query);
        }

        function appendMessage(sender, text) {
            var chatMessages = document.getElementById('chatMessages');
            var msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? 'max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed msg-fade bg-indigo-600 text-white mr-auto rounded-br-none text-left' 
                : 'max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed msg-fade glass text-slate-100 ml-auto rounded-bl-none text-right';

            msgDiv.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function fetchAIResponse(userQuery) {
            // رسالة انتظام خفيفة
            var chatMessages = document.getElementById('chatMessages');
            var loadingDiv = document.createElement('div');
            loadingDiv.className = "text-xs text-slate-500 animate-pulse ml-auto p-2";
            loadingDiv.id = "ai-loading";
            loadingDiv.innerText = "بص بقا.. جاري التفكير وفلترة الرد فوراً... 🧠";
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // محاولة الاتصال بالسيرفر
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'meta-llama/llama-3-8b-instruct:free',
                        messages: [{ role: 'user', content: userQuery }]
                    })
                });

                if (document.getElementById('ai-loading')) document.getElementById('ai-loading').remove();

                if (!response.ok) throw new Error();

                const data = await response.json();
                let aiReply = data.choices[0].message.content;
                appendMessage('bot', aiReply);

            } catch (error) {
                // خطة الإنقاذ السريعة والمضمونة 100% لو السيرفر محجوب أو مهنج
                if (document.getElementById('ai-loading')) document.getElementById('ai-loading').remove();
                
                var fallbackReply = `بص يا حبيب أخوك، أنا معاك وسامعك كويس جداً بخصوص (**${userQuery}**)! 🧠<br><br>عشان ننجز وقتك والدنيا تمشي صح، جرب تفهمني تفاصيل أكتر أو اكتبلي سطر الكود اللي واقف معاك بالظبط، وأنا هصلحهولك ونظبطه سوا حالاً يا صاحبي!`;
                
                var q = userQuery.toLowerCase();
                if (q.includes('sql') || q.includes('جدول') || q.includes('قاعدة')) {
                    fallbackReply = "بص بقا يا صاحبي، طالما دخلنا في الـ SQL ركز معايا، أحسن استعلام تفحص بيه جدولك هو كدا:<br><br><code class='text-indigo-400 bg-slate-950 px-2 py-1 rounded font-mono text-xs'>SELECT item_id, status FROM inventory_levels LIMIT 10;</code><br><br> جرب ده وقولي الجداول ظبطت معاك ولا لسه؟";
                } else if (q.includes('كود') || q.includes('برمجة') || q.includes('javascript')) {
                    fallbackReply = "يا صاحبي البرمجة لعبتنا! لو بتكتب JavaScript، نصيحة أخوية: استخدم دايماً الـ `async/await` لما تيجي تسحب داتا من أي موقع (API) عشان الصفحة متقفلش في وش العميل والموقع يفضل طلقة! 🚀";
                } else if (q.includes('سلام') || q.includes('ازيك') || q.includes('مرحبا')) {
                    fallbackReply = "يا مرحب بحبيب أخوك! 😎 منور محرك بحث Shatter. قول لي بقا، إيه اللي واقف معاك النهاردة وعايزنا نظبطه سوا؟ اكتب سؤالك وعينيا ليك!";
                }

                appendMessage('bot', fallbackReply);
            }
        }

        function resetToSearch() {
            document.getElementById('chatMessages').innerHTML = "";
            document.getElementById('chatMode').classList.add('hidden');
            document.getElementById('chatMode').classList.remove('flex');
            document.getElementById('searchMode').classList.remove('hidden');
        }

        // تشغيل بالـ Enter
        document.getElementById('mainSearchInput').addEventListener("keypress", function(e) { if (e.key === "Enter") startChatMode(); });
        document.getElementById('chatInput').addEventListener("keypress", function(e) { if (e.key === "Enter") sendChatMessage(); });
    </script>
</body>
</html>
