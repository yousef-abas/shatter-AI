<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#030712">
<title>Shatter Search | ذكاء اصطناعي حقيقي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--p:#6366f1;--pd:#4f46e5;--pl:#818cf8;--bg:#030712;--bd:rgba(255,255,255,0.07);--tx:#f1f5f9;--mu:#64748b;}
*{font-family:'Cairo',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);display:flex;flex-direction:column;}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(99,102,241,.04)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbF 14s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(99,102,241,.07);top:-120px;right:-120px;}
.orb2{width:280px;height:280px;background:rgba(139,92,246,.05);bottom:80px;left:-80px;animation-delay:-7s;}
@keyframes orbF{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-28px) scale(1.04);}}
header{position:relative;z-index:50;background:rgba(3,7,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 16px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ic{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-tx{font-weight:900;font-size:15px;letter-spacing:-.5px;}
.logo-tx span{color:var(--pl);}
.model-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);font-size:11px;font-weight:700;color:var(--pl);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:lp 2s infinite;}
@keyframes lp{0%,100%{opacity:1;}50%{opacity:.4;}}
.icon-btn{width:36px;height:36px;border-radius:10px;background:transparent;border:1px solid var(--bd);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:14px;}
.icon-btn:hover{background:rgba(255,255,255,.06);color:var(--tx);}
.app-body{flex:1;display:flex;overflow:hidden;position:relative;z-index:1;}
.sidebar{width:260px;flex-shrink:0;background:rgba(8,12,28,.97);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:16px;border-bottom:1px solid var(--bd);}
.new-btn{width:100%;padding:10px 14px;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:12px;color:white;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.new-btn:hover{opacity:.9;transform:translateY(-1px);}
.new-btn:active{transform:scale(.98);}
.sec-lbl{padding:12px 16px 6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--mu);}
.chat-list{flex:1;overflow-y:auto;padding:4px 8px;}
.chat-list::-webkit-scrollbar{width:3px;}
.chat-list::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:4px;}
.ci{padding:10px;border-radius:10px;margin-bottom:3px;cursor:pointer;transition:all .2s;border:1px solid transparent;display:flex;align-items:flex-start;gap:8px;}
.ci:hover{background:rgba(255,255,255,.04);border-color:var(--bd);}
.ci.active{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);}
.ci-ic{color:var(--pl);font-size:11px;margin-top:2px;flex-shrink:0;}
.ci-title{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-meta{font-size:10px;color:var(--mu);margin-top:2px;}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bd);}
.model-sel{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;padding:8px 10px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:12px;outline:none;cursor:pointer;margin-top:6px;}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:24px 16px 16px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:4px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:20px;text-align:center;}
.w-orb{width:72px;height:72px;border-radius:24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;box-shadow:0 0 40px rgba(99,102,241,.3);}
.welcome h1{font-size:2.2rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.welcome p{font-size:13px;color:var(--pl);font-weight:600;margin-bottom:28px;}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:520px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;}
.chip:hover{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.35);color:#c7d2fe;transform:translateY(-2px);}
.chip i{color:var(--pl);font-size:11px;}
.msg-row{display:flex;margin-bottom:16px;animation:mIn .35s cubic-bezier(.23,1,.32,1) both;}
@keyframes mIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.msg-row.user{justify-content:flex-start;}
.msg-row.ai{justify-content:flex-end;}
.bubble{max-width:82%;padding:12px 16px;border-radius:18px;font-size:13.5px;line-height:1.75;word-wrap:break-word;}
.bubble.user{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border-bottom-right-radius:4px;}
.bubble.ai{background:rgba(20,30,60,.9);border:1px solid rgba(255,255,255,.07);color:#e2e8f0;border-bottom-left-radius:4px;}
.bubble.err{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:#fca5a5;}
.md h1,.md h2,.md h3{color:#a5b4fc;font-weight:800;margin:12px 0 6px;}
.md h1{font-size:1rem;}.md h2,.md h3{font-size:.95rem;}
.md p{margin:6px 0;}.md ul,.md ol{padding-right:18px;margin:6px 0;}.md li{margin:4px 0;}
.md strong{color:#c7d2fe;}.md em{color:#a5b4fc;}
.md code{background:rgba(99,102,241,.15);color:#c7d2fe;padding:2px 6px;border-radius:5px;font-size:12px;font-family:monospace;}
.md pre{background:#0a0f1e;border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:14px 16px;overflow-x:auto;margin:10px 0;direction:ltr;text-align:left;}
.md pre code{background:none;padding:0;font-size:12px;}
.md blockquote{border-right:3px solid #6366f1;padding-right:12px;margin:8px 0;color:#94a3b8;font-style:italic;}
.md a{color:#818cf8;}.md a:hover{text-decoration:underline;}
.b-actions{display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);}
.b-act{background:none;border:none;cursor:pointer;color:var(--mu);font-size:11px;font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:5px;padding:0;transition:color .2s;}
.b-act:hover{color:var(--pl);}
.typing{display:flex;align-items:center;gap:4px;padding:14px 18px;}
.td{width:7px;height:7px;border-radius:50%;background:var(--pl);animation:tb 1.3s infinite ease-in-out both;}
.td:nth-child(1){animation-delay:-.32s;}.td:nth-child(2){animation-delay:-.16s;}
@keyframes tb{0%,80%,100%{transform:scale(.4);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.input-area{padding:12px 16px 16px;background:rgba(3,7,18,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);flex-shrink:0;}
.input-box{display:flex;align-items:flex-end;gap:10px;background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:8px 8px 8px 14px;transition:border-color .2s;}
.input-box:focus-within{border-color:rgba(99,102,241,.4);}
.msg-in{flex:1;background:none;border:none;outline:none;color:var(--tx);font-family:'Cairo',sans-serif;font-size:13.5px;line-height:1.6;resize:none;min-height:24px;max-height:120px;padding:6px 0;text-align:right;}
.msg-in::placeholder{color:var(--mu);}
.send-btn{width:42px;height:42px;flex-shrink:0;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:13px;color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.send-btn:hover{opacity:.9;transform:scale(1.05);}
.send-btn:active{transform:scale(.95);}
.send-btn:disabled{opacity:.4;pointer-events:none;}
.hint{text-align:center;font-size:10px;color:rgba(100,116,139,.5);margin-top:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(13,21,38,.97);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 20px;color:white;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 16px 32px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);z-index:999;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.mob-toggle{display:none;}
@media(max-width:768px){
  .sidebar{position:fixed;right:-280px;top:56px;bottom:0;z-index:100;border-right:1px solid var(--bd);}
  .sidebar.open{right:0;box-shadow:-20px 0 40px rgba(0,0,0,.5);}
  .sb-overlay{position:fixed;inset:0;top:56px;z-index:90;background:rgba(0,0,0,.5);display:none;}
  .sb-overlay.open{display:block;}
  .mob-toggle{display:flex;}
  .welcome h1{font-size:1.7rem;}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="toast" id="toast"><i id="t-icon" class="fas fa-check-circle" style="color:#10b981"></i><span id="t-msg">تم!</span></div>
<div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
<header>
  <div class="logo">
    <button class="icon-btn mob-toggle" onclick="toggleSb()"><i class="fas fa-bars"></i></button>
    <div class="logo-ic"><i class="fas fa-bolt" style="color:white"></i></div>
    <span class="logo-tx">SHATTER <span>SEARCH</span></span>
  </div>
  <div class="model-pill">
    <div class="live-dot"></div>
    <span id="modelLabel">Gemini Flash</span>
  </div>
  <div style="width:36px"></div>
</header>
<div class="app-body">
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <button class="new-btn" onclick="newChat()"><i class="fas fa-plus"></i> محادثة جديدة</button>
    </div>
    <div class="sec-lbl">المحادثات</div>
    <div class="chat-list" id="chatList"></div>
    <div class="sb-foot">
      <div style="font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">الموديل</div>
      <select class="model-sel" id="modelSel" onchange="onModelChange()">
        <option value="gemini-1.5-flash">Gemini 1.5 Flash (مجاني)</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro (أقوى)</option>
      </select>
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;">
        <div class="live-dot"></div>
        <span style="font-size:11px;color:var(--mu)">Cloudflare Worker Proxy</span>
      </div>
      <button onclick="clearAll()" style="background:none;border:none;color:#ef4444;font-size:11px;font-family:'Cairo',sans-serif;cursor:pointer;margin-top:8px;padding:0;">
        <i class="fas fa-trash" style="margin-left:5px"></i> مسح كل المحادثات
      </button>
    </div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="w-orb"><i class="fas fa-brain"></i></div>
        <h1>SHATTER SEARCH</h1>
        <p>ذكاء اصطناعي حقيقي — بيجاوب على أي حاجة</p>
        <div class="chips">
          <button class="chip" onclick="ask('اكتبلي كود Python يحسب الأعداد الأولية من 1 لـ 100')"><i class="fab fa-python"></i> كود Python</button>
          <button class="chip" onclick="ask('اشرحلي النسبية العامة بمثال بسيط')"><i class="fas fa-atom"></i> فيزياء</button>
          <button class="chip" onclick="ask('اكتبلي وصفة كشري مصري أصلي')"><i class="fas fa-utensils"></i> طبخ</button>
          <button class="chip" onclick="ask('اكتبلي إيميل رسمي للمدير عن طلب إجازة')"><i class="fas fa-envelope"></i> إيميل رسمي</button>
          <button class="chip" onclick="ask('اشرحلي الفرق بين React و Vue و Angular')"><i class="fab fa-react"></i> مقارنة Frameworks</button>
          <button class="chip" onclick="ask('اكتبلي قصة قصيرة مضحكة بالعربي')"><i class="fas fa-book"></i> قصة</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="msgIn" class="msg-in" placeholder="اسأل عن أي حاجة..." rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <i class="fas fa-paper-plane" id="sendIc"></i>
        </button>
      </div>
      <div class="hint">Shatter Search — مدعوم بـ Gemini من Google</div>
    </div>
  </div>
</div>

<script>
const PROXY_URL = "https://my-first-api.jsmith1233446.workers.dev/";

const MODEL_NAMES = {
  "gemini-1.5-flash": "Gemini Flash",
  "gemini-1.5-pro": "Gemini Pro"
};

const SYSTEM = "أنت مساعد ذكي اسمه Shatter Search. بتتكلم بالعربي العامي المصري. بتجاوب بشكل مفيد ومنظم. لو السؤال عن كود، اكتبه بشكل صح. لو سؤال عام، جاوب باختصار وتنظيم.";

let chats = JSON.parse(localStorage.getItem("ss_chats") || "[]");
let curId = null;
let loading = false;
let history = [];

function init() {
  const saved = localStorage.getItem("ss_model");
  if (saved) document.getElementById("modelSel").value = saved;
  updateLabel();
  if (!chats.length) createChat();
  else loadChat(chats[0].id);
  renderList();
}

function createChat() {
  const c = {id:Date.now().toString(),title:"محادثة جديدة",messages:[],createdAt:new Date().toISOString()};
  chats.unshift(c); save(); loadChat(c.id); renderList(); return c;
}

function newChat() { createChat(); closeSb(); toast("محادثة جديدة ✨"); }

function loadChat(id) {
  curId = id;
  const c = chats.find(x => x.id === id);
  if (!c) return;
  history = c.messages.map(m => ({role:m.role,content:m.content}));
  const box = document.getElementById("messages");
  const wel = document.getElementById("welcome");
  box.innerHTML = ""; box.appendChild(wel);
  wel.style.display = c.messages.length ? "none" : "flex";
  c.messages.forEach(m => render(m.role, m.content, m.id, false));
  renderList(); scrollD();
}

function renderList() {
  const el = document.getElementById("chatList");
  if (!chats.length) { el.innerHTML = '<p style="font-size:12px;color:var(--mu);text-align:center;padding:20px 0">مفيش محادثات</p>'; return; }
  el.innerHTML = chats.slice(0,40).map(c => {
    const a = c.id === curId;
    const t = (c.messages[0]?.content || c.title).slice(0,35);
    const d = new Date(c.createdAt).toLocaleDateString("ar-EG",{month:"short",day:"numeric"});
    return `<div class="ci ${a?"active":""}" onclick="loadChat('${c.id}')">
      <i class="fas fa-comment-alt ci-ic"></i>
      <div style="overflow:hidden;flex:1">
        <div class="ci-title">${esc(t)}</div>
        <div class="ci-meta">${d} · ${c.messages.length} رسالة</div>
      </div></div>`;
  }).join("");
}

function save() { localStorage.setItem("ss_chats", JSON.stringify(chats.slice(0,50))); }

function clearAll() {
  if (!confirm("متأكد؟")) return;
  chats = []; save(); createChat(); toast("تم المسح 🗑️");
}

function ask(t) { document.getElementById("msgIn").value = t; send(); }

async function send() {
  const inp = document.getElementById("msgIn");
  const txt = inp.value.trim();
  if (!txt || loading) return;
  const c = chats.find(x => x.id === curId);
  if (!c) return;
  document.getElementById("welcome").style.display = "none";
  inp.value = ""; resize(inp);
  const uid = "u"+Date.now(), aid = "a"+Date.now();
  c.messages.push({role:"user",content:txt,id:uid});
  if (c.messages.filter(m=>m.role==="user").length===1) c.title = txt.slice(0,40);
  history.push({role:"user",content:txt});
  save(); render("user",txt,uid); renderList();
  const typ = document.createElement("div");
  typ.className = "msg-row ai"; typ.id = "typing";
  typ.innerHTML = `<div class="bubble ai"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  document.getElementById("messages").appendChild(typ); scrollD();
  loading = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("sendIc").className = "fas fa-spinner fa-spin";
  try {
    const reply = await callProxy(history);
    typ.remove();
    c.messages.push({role:"assistant",content:reply,id:aid});
    history.push({role:"assistant",content:reply});
    save(); render("assistant",reply,aid);
    toast("الرد جاهز ✨");
  } catch(e) {
    typ.remove();
    render("err", "**حصل خطأ 😅**\n\n`"+e.message+"`", "err"+Date.now());
    toast("حصل خطأ 😅","error");
  } finally {
    loading = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("sendIc").className = "fas fa-paper-plane";
    scrollD();
  }
}

async function callProxy(msgs) {
  const model = document.getElementById("modelSel").value;
  const res = await fetch(PROXY_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model, max_tokens:2048, system:SYSTEM, messages:msgs})
  });
  if (!res.ok) {
    const d = await res.json().catch(()=>({}));
    throw new Error(d?.error?.message || "HTTP "+res.status);
  }
  const d = await res.json();
  return d.content?.[0]?.text || "مفيش رد";
}

function render(role, content, id, doScroll=true) {
  const isUser = role==="user", isErr = role==="err";
  const row = document.createElement("div");
  row.className = "msg-row "+(isUser?"user":"ai");
  row.id = "msg_"+id;
  const cls = "bubble "+(isUser?"user":isErr?"ai err":"ai");
  row.innerHTML = isUser
    ? `<div class="${cls}">${esc(content).replace(/\n/g,"<br>")}</div>`
    : `<div class="${cls}"><div class="md">${mdRender(content)}</div>
        <div class="b-actions">
          <button class="b-act" onclick="copyTxt(${JSON.stringify(content)})"><i class="fas fa-copy"></i> نسخ</button>
          <button class="b-act" onclick="regen('${id}')"><i class="fas fa-redo"></i> إعادة</button>
        </div></div>`;
  document.getElementById("messages").appendChild(row);
  if (doScroll) scrollD();
}

function mdRender(t) {
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>").replace(/^## (.+)$/gm,"<h2>$1</h2>").replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>")
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/^\* (.+)$/gm,"<li>$1</li>").replace(/^\d+\. (.+)$/gm,"<li>$1</li>")
    .replace(/^---$/gm,"<hr>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g,"<br>");
}

function esc(t) { const d=document.createElement("div"); d.textContent=t; return d.innerHTML; }
function copyTxt(t) { navigator.clipboard.writeText(t).then(()=>toast("تم النسخ 📋")); }

function regen(id) {
  const c = chats.find(x=>x.id===curId); if(!c) return;
  const idx = c.messages.findIndex(m=>m.id===id);
  if (idx>0 && c.messages[idx-1].role==="user") {
    const q = c.messages[idx-1].content;
    document.getElementById("msg_"+id)?.remove();
    c.messages.splice(idx,1);
    history = c.messages.map(m=>({role:m.role,content:m.content}));
    save();
    document.getElementById("msgIn").value = q; send();
  }
}

function scrollD() { const m=document.getElementById("messages"); m.scrollTop=m.scrollHeight; }
function resize(el) { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,120)+"px"; }
function onKey(e) { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }
function toggleSb() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("sbOverlay").classList.toggle("open"); }
function closeSb() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("sbOverlay").classList.remove("open"); }
function onModelChange() { const v=document.getElementById("modelSel").value; localStorage.setItem("ss_model",v); updateLabel(); }
function updateLabel() { const v=document.getElementById("modelSel").value; document.getElementById("modelLabel").textContent=MODEL_NAMES[v]||"Gemini"; }

function toast(msg,type="ok") {
  const t=document.getElementById("toast"),ic=document.getElementById("t-icon");
  document.getElementById("t-msg").textContent=msg;
  ic.className=type==="error"?"fas fa-exclamation-circle":type==="warn"?"fas fa-exclamation-triangle":"fas fa-check-circle";
  ic.style.color=type==="error"?"#ef4444":type==="warn"?"#f59e0b":"#10b981";
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3000);
}

init();
