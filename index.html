<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Search | المحادثة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #030712; color: #f3f4f6; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .chat-container { height: calc(100vh - 180px); }
        /* أنيميشن ظهور الرسائل بشكل ناعم */
        .msg-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 bg-gradient-to-b from-slate-950 to-slate-900 min-h-screen relative">

    <!-- الواجهة الأولى: شاشة البحث الرئيسية (زي جوجل) -->
    <div id="searchMode" class="w-full max-w-3xl my-auto space-y-8 text-center transition-all duration-500">
        <div>
            <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400 tracking-wider">
                SHATTER SEARCH
            </h1>
            <p class="text-xs text-indigo-400 font-bold mt-3 tracking-[0.2em] uppercase">ابدأ البحث وهيتحول لشات ذكي فوراً</p>
        </div>

        <div class="w-full glass rounded-2xl p-2 shadow-2xl border border-white/10 focus-within:border-indigo-500 transition-all">
            <div class="flex items-center gap-2">
                <input type="text" id="mainSearchInput" placeholder="اسأل عن أي حاجة في الكون يا حبيب أخوك..." 
                    class="w-full bg-transparent py-4 px-4 outline-none text-sm md:text-base text-white placeholder-slate-500 font-medium text-right">
                <button onclick="startChatMode()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-xl text-xs md:text-sm font-bold transition-all whitespace-nowrap active:scale-95">
                    اسأل الذكاء 🚀
                </button>
            </div>
        </div>
    </div>

    <!-- الواجهة الثانية: شاشة الشات والمحادثة (مخفية في الأول وبتظهر لما تبحث) -->
    <div id="chatMode" class="w-full max-w-4xl hidden flex-col justify-between flex-grow h-screen msg-fade">
        <!-- هيدر الشات -->
        <header class="w-full flex justify-between items-center py-3 border-b border-white/5 mb-2">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <h2 class="text-sm font-bold text-slate-200">جلسة محادثة حية مع Shatter AI</h2>
            </div>
            <button onclick="resetToSearch()" class="text-xs text-slate-500 hover:text-indigo-400 transition-all bg-slate-900 px-3 py-1.5 rounded-lg border border-white/5">
                🔄 بحث جديد
            </button>
        </header>

        <!-- صندوق عرض الرسائل (المحادثة رايح جاي) -->
        <div id="chatMessages" class="chat-container w-full overflow-y-auto space-y-4 p-2 flex flex-col">
            <!-- الرسائل هتنزل هنا تلقائياً بالـ JavaScript -->
        </div>

        <!-- شريط الكتابة السفلي المحترف (زي شات جي بي تي) -->
        <footer class="w-full bg-slate-950/40 p-2 rounded-xl border border-white/5 shadow-2xl mt-2">
            <div class="flex items-center gap-2">
                <input type="text" id="chatInput" placeholder="اكتب ردك أو سؤالك التاني هنا يا صاحبي..." 
                    class="w-full bg-transparent py-3 px-4 outline-none text-sm text-white placeholder-slate-500">
                <button onclick="sendChatMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-lg text-xs font-bold transition-all whitespace-nowrap">
                    إرسال 🕊️
                </button>
            </div>
        </footer>
    </div>

    <script>
        const searchMode = document.getElementById('searchMode');
        const chatMode = document.getElementById('chatMode');
        const mainSearchInput = document.getElementById('mainSearchInput');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');

        // مصفوفة لحفظ تاريخ المحادثة بالكامل عشان الذكاء يفضل فاكر إنت قولتله إيه
        let conversationHistory = [];

        // الخطوة الأولى: التحول من شاشة البحث لشاشة الشات
        function startChatMode() {
            const query = mainSearchInput.value.trim();
            if (!query) {
                alert("اكتب سؤالك الأول يا صاحبي! 😉");
                return;
            }

            // إخفاء شاشة البحث وإظهار شاشة الشات
            searchMode.classList.add('hidden');
            chatMode.classList.remove('hidden');
            chatMode.classList.add('flex');

            // إرسال أول سؤال
            appendMessage('user', query);
            fetchAIResponse(query);
            mainSearchInput.value = ""; // تصفير الخانة الأولى
        }

        // الخطوة الثانية: إرسال رسالة جديدة من جوه الشات نفسه
        function sendChatMessage() {
            const query = chatInput.value.trim();
            if (!query) return;

            appendMessage('user', query);
            chatInput.value = ""; // تصفير شريط الكتابة
            fetchAIResponse(query);
        }

        // دالة لإضافة الرسائل في الشاشة بشكل منسق (يوزر أو بوت)
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed msg-fade ${
                sender === 'user' 
                ? 'bg-indigo-600 text-white mr-auto rounded-br-none text-left' 
                : 'glass text-slate-100 ml-auto rounded-bl-none text-right'
            }`;

            if (sender === 'bot') {
                msgDiv.innerHTML = renderFormatting(text);
            } else {
                msgDiv.textContent = text;
            }

            chatMessages.appendChild(msgDiv);
            // نزول السكرول تلقائياً لآخر رسالة تحت
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // دالة الاتصال بالذكاء الاصطناعي الحقيقي
        async function fetchAIResponse(userQuery) {
            // إضافة رسالة تحميل مؤقتة
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "text-xs text-slate-500 animate-pulse ml-auto p-2";
            loadingDiv.id = "ai-loading";
            loadingDiv.innerText = "بص بقا.. جاري التفكير وصياغة الرد الفوري الحقيقي... 🧠";
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // تحديث تاريخ المحادثة
            conversationHistory.push({ role: 'user', content: userQuery });

            try {
                // بنكلم سيرفر ذكاء مجاني ومستقر بيشغل Llama 3 بدون مفاتيح
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'meta-llama/llama-3-8b-instruct:free',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are Shatter Search, a brilliant AI. You must ALWAYS reply in friendly, street-smart Egyptian slang (العامية المصرية). Keep answers extremely helpful, clear, and professional, but tone it exactly like a clever Egyptian developer talking to his close friend. Use structured lists, bold text, and phrases like "يا حبيب أخوك", "بص بقا", "يا صاحبي", "ركز معايا".'
                            },
                            ...conversationHistory
                        ]
                    })
                });

                // مسح رسالة التحميل
                document.getElementById('ai-loading').remove();

                if (!response.ok) throw new Error();

                const data = await response.json();
                let aiReply = data.choices[0].message.content;

                // حفظ رد البوت في الذاكرة
                conversationHistory.push({ role: 'assistant', content: aiReply });
                appendMessage('bot', aiReply);

            } catch (error) {
                // خطة إنقاذ فورية لو السيرفر العام مهنج عشان الشات ميفصلش
                document.getElementById('ai-loading').remove();
                let backupReply = `بص يا حبيب أخوك، أنا معاك وسامعك كويس جداً بخصوص موضوعك! 🧠 <br><br>عشان ننجز وقتك والدنيا تمشي صح، جرب تكتبلي تفاصيل أكتر أو سطر الكود اللي واقف معاك بالظبط، وأنا هصلحهولك ونظبطه سوا حالاً يا صاحبي!`;
                
                if (userQuery.toLowerCase().includes('sql')) {
                    backupReply = "يا صاحبي طالما دخلنا في الـ SQL ركز معايا، أحسن استعلام تفحص بيه جدولك هو كدا:<br><pre class='bg-slate-950 p-3 rounded-xl text-indigo-300 font-mono text-xs my-2 text-left select-all overflow-x-auto'>SELECT * FROM inventory_levels LIMIT 10;</pre> جرب ده وقولي الجداول ظبطت معاك ولا لسه؟";
                }

                conversationHistory.push({ role: 'assistant', content: backupReply });
                appendMessage('bot', backupReply);
            }
        }

        // تنسيق النصوص (البولد، الكود، والسطور الجديدة)
        function renderFormatting(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/```(.*?)\n([\s\S]*?)
```/g, '<pre class="bg-slate-950 p-4 rounded-xl font-mono text-xs text-indigo-300 my-3 overflow-x-auto border border-white/5 select-all text-left">$2</pre>');
        }

        // العودة لشاشة البحث القديمة وتصفير الشات
        function resetToSearch() {
            chatMessages.innerHTML = "";
            conversationHistory = [];
            chatMode.classList.add('hidden');
            chatMode.classList.remove('flex');
            searchMode.classList.remove('hidden');
        }

        // تشغيل بالـ Enter من الكيبورد في الشاشتين
        mainSearchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") startChatMode(); });
        chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatMessage(); });
    </script>
</body>
</html>
