<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter AI | Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
            overflow: hidden;
            height: 100vh;
        }
        .ai-bg-glow {
            background: radial-gradient(circle at 50% -20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.4; filter: blur(40px); }
            50% { transform: scale(1.1); opacity: 0.8; filter: blur(60px); }
        }
        .glow-orb {
            position: absolute; width: 300px; height: 300px; background: #6366f1;
            border-radius: 50%; top: 25%; left: 40%; transform: translate(-50%, -50%);
            z-index: 0; animation: pulse-glow 4s ease-in-out infinite; pointer-events: none;
        }
        .glass-blur {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fade-out-screen {
            opacity: 0 !important;
            visibility: hidden !hidden !important;
            transform: scale(0.95) translateY(-20px);
            transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .hidden-chat { display: none !important; }
        .visible-chat { display: flex !important; animation: fadeInChat 1s forwards 0.3s; }
        @keyframes fadeInChat {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    </style>
</head>
<body class="ai-bg-glow relative flex items-center justify-center p-4">

    <!-- شاشة الوميض والـ Prompt الترحيبي -->
    <div id="welcome-prompt-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center px-4 bg-[#030712] transition-all duration-700">
        <div class="glow-orb"></div>
        
        <div class="z-10 text-center max-w-xl w-full space-y-8">
            <div class="space-y-2">
                <h1 class="text-5xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400">
                    SHATTER AI
                </h1>
                <p class="text-[11px] text-indigo-400 font-medium tracking-[0.3em] uppercase">Developed by Youssef Abbas</p>
            </div>

            <div class="space-y-4 max-w-sm mx-auto">
                <!-- حقل اسم المستخدم -->
                <div class="relative glass-blur rounded-2xl p-1 border border-white/10 shadow-2xl focus-within:border-indigo-500 transition-all">
                    <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا..." 
                        class="w-full bg-transparent py-3 px-4 outline-none text-xs text-center text-white placeholder-slate-500 font-medium">
                </div>
                
                <!-- حقل مفتاح الـ API لضمان الأمان التام وعدم القفش -->
                <div class="relative glass-blur rounded-2xl p-1 border border-white/10 shadow-2xl focus-within:border-indigo-500 transition-all">
                    <input type="password" id="tokenInput" placeholder="حط Hugging Face Token بتاعك هنا..." 
                        class="w-full bg-transparent py-3 px-4 outline-none text-xs text-center text-white placeholder-slate-500 font-medium">
                </div>

                <button onclick="startApp()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-xl transition-all shadow-lg shadow-indigo-600/30">
                    دخول والربط بالمخ الذكي →
                </button>
            </div>
            <p class="text-[10px] text-slate-500">ماتقلقش، الـ Token بتاعك بيتحفظ في متصفحك إنت بس ومش بنرفعه على جيت هب</p>
        </div>
    </div>

    <!-- واجهة المحادثة الرئيسية -->
    <div id="main-chat-interface" class="hidden-chat w-full h-full gap-4 max-w-[1600px]">
        
        <!-- Sidebar -->
        <aside class="w-80 glass-blur rounded-[24px] p-6 flex flex-col hidden lg:flex">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center font-black text-white text-md shadow-md">
                    S
                </div>
                <div>
                    <h2 class="text-md font-extrabold text-slate-200 tracking-wide">Shatter.AI</h2>
                    <p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Secure Connection</p>
                </div>
            </div>

            <div class="flex-grow overflow-y-auto space-y-2">
                <p class="text-[10px] text-slate-600 font-bold uppercase tracking-wider mb-2">الحالة الحالية</p>
                <div class="p-3 rounded-xl bg-emerald-500/5 border border-emerald-500/10 text-xs flex items-center justify-between">
                    <span class="text-emerald-400" id="connectionStatus">⚡ متصل آمن وجاهز</span>
                </div>
            </div>

            <div class="mt-auto pt-4 border-t border-white/5 flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-r from-indigo-500 to-cyan-500 flex items-center justify-center text-xs font-bold text-white" id="avatarName">YA</div>
                <div>
                    <p class="text-xs font-bold text-slate-300" id="displayUsername">يوسف عباس</p>
                    <p class="text-[9px] text-indigo-400 uppercase tracking-wide font-medium">مطور الأداة</p>
                </div>
            </div>
        </aside>

        <!-- منطقة الشات -->
        <main class="flex-grow flex flex-col glass-blur rounded-[24px] overflow-hidden">
            <header class="px-8 py-5 border-b border-white/5 flex justify-between items-center bg-slate-950/20">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <h3 class="text-xs font-bold text-slate-400">المحرك الحالي: <span class="text-indigo-400 font-mono">Llama-3-Secure-Core</span></h3>
                </div>
            </header>

            <div id="chatBox" class="flex-grow overflow-y-auto p-8 space-y-6"></div>

            <footer class="p-6 bg-slate-950/20 border-t border-white/5">
                <div class="max-w-4xl mx-auto relative flex items-center">
                    <input type="text" id="userInput" placeholder="اسأل Shatter AI بالبلدي كدا وهيجاوبك فوراً..." 
                        class="w-full bg-slate-900/40 border border-white/5 rounded-xl py-4 px-6 pl-24 pr-6 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-xs text-slate-200">
                    <button onclick="handleSend()" class="absolute left-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">
                        إرسال 🚀
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let userName = "يوسف";
        let hfToken = ""; // مبقاش مكشوف خلاص!

        const promptScreen = document.getElementById('welcome-prompt-screen');
        const mainChat = document.getElementById('main-chat-interface');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const usernameInput = document.getElementById('usernameInput');
        const tokenInput = document.getElementById('tokenInput');

        // أول ما الأبلكيشن يفتح بنشوف لو معاه توكن قديم متسيف في المتصفح عشان مايكتبوش تاني
        window.onload = () => {
            if(localStorage.getItem('hf_token')) {
                tokenInput.value = localStorage.getItem('hf_token');
            }
        };

        function startApp() {
            const inputVal = usernameInput.value.trim();
            const tokenVal = tokenInput.value.trim();

            if (!tokenVal) {
                alert("يا حبيب أخوك لازم تحط التوكن بتاعك عشان المخ الذكي يشتغل!");
                return;
            }

            // سيفنا التوكن بأمان في متصفح المستخدم ومش هيتفرع لجيت هب
            hfToken = tokenVal;
            localStorage.setItem('hf_token', hfToken);

            if (inputVal) {
                userName = inputVal;
                document.getElementById('displayUsername').innerText = userName;
                document.getElementById('avatarName').innerText = userName.substring(0, 2).toUpperCase();
            }

            promptScreen.classList.add('fade-out-screen');
            
            setTimeout(() => {
                promptScreen.style.display = 'none';
                mainChat.classList.remove('hidden-chat');
                mainChat.classList.add('visible-chat');
                initWelcomeMessage();
            }, 700);
        }

        function initWelcomeMessage() {
            chatBox.innerHTML = `
                <div class="flex flex-col items-start gap-2 max-w-[85%]">
                    <div class="p-4 rounded-2xl rounded-tr-none bg-gradient-to-br from-indigo-950/30 to-slate-900/30 border border-indigo-500/10 text-xs leading-relaxed text-slate-300">
                        منور يا حبيب أخوك يا ${userName}! 😎 التوكن بتاعك اتربط بأمان تام بعيد عن قفش جيت هب. قول لي بقا، إيه المشكلة اللي واقفة قدامك النهاردة؟ اسأل براحتك!
                    </div>
                </div>`;
        }

        async function handleSend() {
            const query = userInput.value.trim();
            if (!query) return;

            appendMessage(query, 'user');
            userInput.value = '';

            const loadingId = appendLoadingPulse();

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${hfToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `<|system|>\nYou are Shatter AI. You must ALWAYS reply in friendly Egyptian slang (العامية المصرية). Keep answers helpful, clear, and professional but structured like an Egyptian developer talking to his friend. Use words like "يا حبيب أخوك", "بص بقا", "يا صاحبي".\n<|user|>\n${query}\n<|assistant|>\n`,
                        parameters: { max_new_tokens: 500, top_p: 0.9, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                let aiText = data[0].generated_text.split("<|assistant|>\n")[1] || "بص يا صاحبي، السيرفر مهنج ثانية، جرب تبعت تاني كدا!";
                appendMessage(aiText.trim(), 'ai');

            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("يا حبيب أخوك شكل النت فيه مشكلة، أو التوكن اللي دخلته غلط، تشيك عليه تاني كدا!", 'ai');
            }
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex flex-col items-end gap-2 max-w-[85%] ml-auto' : 'flex flex-col items-start gap-2 max-w-[85%]';
            
            let formattedText = text.replace(/\n/g, '<br>');
            
            if (text.includes('```')) {
                formattedText = text.replace(/
```(.*?)\n([\s\S]*?)```/g, '<pre class="bg-slate-950/60 p-4 rounded-lg font-mono text-[11px] text-indigo-300 my-2 overflow-x-auto select-all w-full border border-white/5">$2</pre>');
            }

            const bubbleClass = sender === 'user' 
                ? 'bg-indigo-600 text-white p-4 rounded-2xl rounded-tl-none text-xs leading-relaxed'
                : 'bg-gradient-to-br from-indigo-950/20 to-slate-900/20 border border-indigo-500/5 text-slate-300 p-4 rounded-2xl rounded-tr-none text-xs leading-relaxed';

            wrapper.innerHTML = `<div class="${bubbleClass}">${formattedText}</div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendLoadingPulse() {
            const id = 'loading-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = 'flex items-center gap-1 p-2 bg-white/5 rounded-lg w-12 justify-center animate-pulse';
            wrapper.innerHTML = `<div class="w-1 h-1 bg-indigo-400 rounded-full"></div><div class="w-1 h-1 bg-indigo-400 rounded-full"></div><div class="w-1 h-1 bg-indigo-400 rounded-full"></div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        usernameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") startApp(); });
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
