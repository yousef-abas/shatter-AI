<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Search Pro | ذكاء اصطناعي حقيقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #030712;
            --surface: rgba(15, 23, 42, 0.65);
        }

        * { font-family: 'Cairo', sans-serif; }

        body { 
            background: linear-gradient(135deg, #030712 0%, #0f172a 50%, #1e1b4b 100%);
            color: #f3f4f6; min-height: 100vh; overflow-x: hidden;
        }

        /* Floating particles */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: rgba(99, 102, 241, 0.3); border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-strong {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Search bar */
        .search-container {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-container:focus-within {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
        }

        .search-input {
            transition: all 0.3s ease;
        }
        .search-input:focus {
            padding-right: 24px;
        }

        /* Button glow */
        .btn-glow {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            transition: all 0.3s ease;
        }
        .btn-glow::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-glow:hover::before { opacity: 1; }
        .btn-glow:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .btn-glow:active { transform: translateY(0); }

        .btn-glow.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* Typing effect */
        .typing-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #6366f1; border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Result card */
        .result-card {
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown styling */
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: #818cf8; font-weight: 800; margin: 16px 0 8px;
        }
        .markdown-content h1 { font-size: 1.3rem; }
        .markdown-content h2 { font-size: 1.1rem; }
        .markdown-content h3 { font-size: 1rem; }
        .markdown-content p { margin: 8px 0; line-height: 1.8; }
        .markdown-content ul, .markdown-content ol { margin: 8px 0; padding-right: 20px; }
        .markdown-content li { margin: 4px 0; }
        .markdown-content strong { color: #a5b4fc; }
        .markdown-content code {
            background: rgba(99, 102, 241, 0.15); color: #c7d2fe;
            padding: 2px 8px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 0.9em;
        }
        .markdown-content pre {
            background: #0f172a; border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px; padding: 16px; overflow-x: auto;
            margin: 12px 0; direction: ltr; text-align: left;
        }
        .markdown-content pre code {
            background: transparent; padding: 0; color: #a5b4fc;
        }
        .markdown-content blockquote {
            border-right: 3px solid #6366f1; padding-right: 16px;
            margin: 12px 0; color: #94a3b8; font-style: italic;
        }
        .markdown-content a {
            color: #818cf8; text-decoration: underline;
            transition: color 0.2s;
        }
        .markdown-content a:hover { color: #a5b4fc; }
        .markdown-content table {
            width: 100%; border-collapse: collapse; margin: 12px 0;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px;
            text-align: right;
        }
        .markdown-content th {
            background: rgba(99, 102, 241, 0.1); font-weight: 700;
        }

        /* History sidebar */
        .history-sidebar {
            position: fixed; left: -320px; top: 0; width: 300px; height: 100vh;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255,255,255,0.08); z-index: 100;
            transition: left 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 24px; overflow-y: auto;
        }
        .history-sidebar.open { left: 0; }
        .history-item {
            padding: 12px; border-radius: 12px; margin-bottom: 8px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: all 0.3s;
        }
        .history-item:hover {
            background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.3);
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 16px 24px; color: white; font-weight: 600;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: translateY(100px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200; display: flex; align-items: center; gap: 12px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

        /* Pulse */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .pulse-ring::after {
            content: ''; position: absolute; inset: -4px;
            border-radius: 50%; border: 2px solid #10b981;
            animation: pulse-ring 2s infinite;
        }

        /* Model selector */
        .model-select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 8px 16px; color: #cbd5e1;
            font-size: 12px; outline: none; cursor: pointer;
            transition: all 0.3s;
        }
        .model-select:hover { background: rgba(255,255,255,0.1); }
        .model-select option { background: #0f172a; color: #cbd5e1; }

        /* Copy button */
        .copy-btn {
            opacity: 0; transition: opacity 0.3s;
        }
        .result-card:hover .copy-btn { opacity: 1; }

        @media (max-width: 768px) {
            .history-sidebar { width: 100%; left: -100%; }
        }
    </style>
<base target="_blank">
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8 min-h-screen relative">

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- History Sidebar -->
    <div class="history-sidebar" id="historySidebar">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-lg text-indigo-300">📜 سجل المحادثات</h3>
            <button onclick="toggleHistory()" class="text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        <div id="historyList"></div>
        <button onclick="clearHistory()" class="w-full mt-4 py-3 rounded-xl bg-rose-500/10 text-rose-400 text-sm font-bold hover:bg-rose-500/20 transition-colors border border-rose-500/20">
            <i class="fas fa-trash-alt ml-2"></i> مسح السجل
        </button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">تم بنجاح</span>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-4 text-xs z-10">
        <div class="flex items-center gap-3">
            <button onclick="toggleHistory()" class="glass px-4 py-2 rounded-xl text-slate-400 hover:text-white transition-all hover:bg-white/10 flex items-center gap-2">
                <i class="fas fa-history"></i> السجل
            </button>
            <select id="modelSelect" class="model-select" onchange="saveModelPreference()">
                <option value="meta-llama/llama-3.2-3b-instruct:free">🦙 Llama 3.2 3B (سريع)</option>
                <option value="meta-llama/llama-3.3-70b-instruct:free">🦙 Llama 3.3 70B (قوي)</option>
                <option value="google/gemma-3-27b-it:free">💎 Gemma 3 27B</option>
                <option value="nvidia/nemotron-3-nano-30b-a3b:free">🧠 Nemotron Nano</option>
                <option value="nousresearch/hermes-3-llama-3.1-405b:free">🔥 Hermes 3 405B</option>
                <option value="deepseek/deepseek-r1:free">⚡ DeepSeek R1</option>
            </select>
        </div>
        <span class="flex items-center gap-2 text-slate-500">
            <span class="relative flex h-2.5 w-2.5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
            </span>
            المحرك متصل ومستعد
        </span>
    </header>

    <!-- Main -->
    <main class="w-full max-w-3xl space-y-6 z-10 my-auto text-center flex-grow flex flex-col justify-center">

        <!-- Logo -->
        <div class="mb-2">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-indigo-500 to-purple-600 mb-4 shadow-2xl shadow-indigo-500/30">
                <i class="fas fa-brain text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400 tracking-tight">
                SHATTER SEARCH
            </h1>
            <p class="text-sm text-indigo-400 font-bold mt-3 flex items-center justify-center gap-2">
                <i class="fas fa-sparkles"></i>
                محرك بحث ذكي حقيقي بيجاوب على أي حاجة في الكوكب
            </p>
        </div>

        <!-- Search -->
        <div class="w-full search-container glass rounded-2xl p-2 shadow-2xl">
            <div class="flex items-center gap-2">
                <input type="text" id="searchInput" 
                    placeholder="اسأل عن أي حاجة في الكون (برمجة، طبخ، تاريخ، علوم...)" 
                    class="search-input w-full bg-transparent py-4 px-4 outline-none text-sm md:text-base text-white placeholder-slate-500 font-medium text-right"
                    autocomplete="off">
                <button id="searchBtn" onclick="executeSearch()" class="btn-glow text-white px-6 py-4 rounded-xl text-xs md:text-sm font-bold whitespace-nowrap flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i>
                    <span id="btnText">اسأل الذكاء</span>
                </button>
            </div>
        </div>

        <!-- Quick suggestions -->
        <div class="flex flex-wrap justify-center gap-2 text-xs">
            <button onclick="quickSearch('اكتبلي كود Python يحسب الفيبوناتشي')" class="glass px-4 py-2 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                <i class="fab fa-python ml-1"></i> كود Python
            </button>
            <button onclick="quickSearch('اشرحلي النسبية العامة ببساطة')" class="glass px-4 py-2 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                <i class="fas fa-atom ml-1"></i> فيزياء
            </button>
            <button onclick="quickSearch('اكتبلي وصفة كشري مصري')" class="glass px-4 py-2 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                <i class="fas fa-utensils ml-1"></i> طبخ
            </button>
            <button onclick="quickSearch('فكرني بأهم أحداث 2025')" class="glass px-4 py-2 rounded-full text-slate-400 hover:text-white hover:bg-white/10 transition-all">
                <i class="fas fa-globe ml-1"></i> تاريخ
            </button>
        </div>

        <!-- Result -->
        <div id="resultContainer" class="w-full hidden text-right">
            <div class="result-card glass-strong rounded-2xl p-6 md:p-8 shadow-2xl relative">
                <div class="flex justify-between items-start mb-4 border-b border-white/5 pb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                            <i class="fas fa-robot text-white text-sm"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-indigo-300">الذكاء الاصطناعي</p>
                            <p class="text-[10px] text-slate-500" id="responseTime">---</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyResponse()" class="copy-btn glass px-3 py-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition-all text-xs flex items-center gap-2">
                            <i class="fas fa-copy"></i> نسخ
                        </button>
                        <button onclick="regenerateResponse()" class="copy-btn glass px-3 py-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 transition-all text-xs flex items-center gap-2">
                            <i class="fas fa-redo"></i> إعادة
                        </button>
                    </div>
                </div>
                <div id="responseText" class="markdown-content text-sm md:text-base text-slate-200 leading-relaxed"></div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center text-[11px] text-slate-600 mt-8 z-10">
        Shatter Search Pro v2.0 | Developed by Youssef Abbas © 2026
    </footer>

    <script>
        // Generate particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            particlesContainer.appendChild(p);
        }

        // State
        let currentQuery = '';
        let conversationHistory = JSON.parse(localStorage.getItem('shatter_history') || '[]');

        // Load saved model preference
        const savedModel = localStorage.getItem('shatter_model');
        if (savedModel) document.getElementById('modelSelect').value = savedModel;

        function saveModelPreference() {
            localStorage.setItem('shatter_model', document.getElementById('modelSelect').value);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');

            msg.innerText = message;
            icon.className = type === 'error' ? 'fas fa-exclamation-circle text-rose-400' : 
                            type === 'warning' ? 'fas fa-exclamation-triangle text-amber-400' :
                            'fas fa-check-circle text-emerald-400';

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function quickSearch(query) {
            document.getElementById('searchInput').value = query;
            executeSearch();
        }

        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            const resultContainer = document.getElementById('resultContainer');
            const responseText = document.getElementById('responseText');
            const model = document.getElementById('modelSelect').value;

            if (!query) {
                showToast('اكتب سؤالك الأول يا صاحبي! 😉', 'warning');
                document.getElementById('searchInput').focus();
                return;
            }

            currentQuery = query;

            // UI loading state
            btn.classList.add('loading');
            btnText.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            resultContainer.classList.remove('hidden');
            responseText.innerHTML = `
                <div class="flex items-center gap-3 text-slate-400">
                    <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center">
                        <i class="fas fa-brain text-indigo-400 text-xs animate-pulse"></i>
                    </div>
                    <span class="text-sm">بص بقا.. بنفكر في الإجابة حالاً وبنجهز لك الرد الحقيقي..</span>
                </div>`;

            const startTime = Date.now();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Shatter Search'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            {
                                role: 'system',
                                content: 'You must ALWAYS reply in friendly, street-smart Egyptian slang (العامية المصرية). Keep answers extremely helpful, clear, and professional, but tone it exactly like a clever Egyptian developer talking to his close friend. Use structured lists, bold text, and phrases like "يا حبيب أخوك", "بص بقا", "يا صاحبي", "ركز معايا". Always format code blocks properly with language tags.'
                            },
                            {
                                role: 'user',
                                content: query
                            }
                        ],
                        temperature: 0.8,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const aiText = data.choices[0].message.content;
                    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

                    document.getElementById('responseTime').innerText = `⏱️ ${elapsed} ثانية • ${model.split('/')[1]}`;
                    renderMarkdown(aiText);

                    // Save to history
                    addToHistory(query, aiText, elapsed);
                    showToast('الرد جاهز يا صاحبي! 🎉');
                } else {
                    throw new Error('السيرفر رجع رد فاضي');
                }

            } catch (error) {
                console.error(error);
                responseText.innerHTML = `
                    <div class="flex items-start gap-3 text-rose-400">
                        <i class="fas fa-exclamation-triangle mt-1"></i>
                        <div>
                            <p class="font-bold mb-2">حصلت مشكلة يا حبيب أخوك!</p>
                            <p class="text-sm text-slate-400">${error.message}</p>
                            <p class="text-sm text-slate-500 mt-3">جرب تختار موديل تاني من القائمة فوق أو تسأل تاني كمان شوية.</p>
                        </div>
                    </div>`;
                showToast('الموديل مش متاح دلوقتي، جرب تاني', 'error');
            } finally {
                btn.classList.remove('loading');
                btnText.innerHTML = '<i class="fas fa-paper-plane"></i> اسأل الذكاء';
            }
        }

        function renderMarkdown(text) {
            let html = text
                // Headers
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // Bold
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Code blocks
                .replace(/```(\w+)?
([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Blockquote
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // Lists
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Line breaks
                .replace(/
/g, '<br>');

            // Wrap consecutive li in ul
            html = html.replace(/(<li>.*?<\/li>)(<br>)*/g, '<ul>$1$2</ul>');

            document.getElementById('responseText').innerHTML = html;
        }

        function copyResponse() {
            const text = document.getElementById('responseText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast('تم النسخ يا صاحبي! 📋');
            });
        }

        function regenerateResponse() {
            if (currentQuery) {
                document.getElementById('searchInput').value = currentQuery;
                executeSearch();
            }
        }

        // History functions
        function addToHistory(query, response, time) {
            const item = { query, response, time, date: new Date().toLocaleString('ar-EG'), model: document.getElementById('modelSelect').value };
            conversationHistory.unshift(item);
            if (conversationHistory.length > 20) conversationHistory.pop();
            localStorage.setItem('shatter_history', JSON.stringify(conversationHistory));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (conversationHistory.length === 0) {
                list.innerHTML = '<p class="text-slate-500 text-sm text-center py-8">مفيش سجل لسه.. اسأل سؤالك الأول!</p>';
                return;
            }
            list.innerHTML = conversationHistory.map((item, i) => `
                <div class="history-item" onclick="loadHistoryItem(${i})">
                    <p class="text-xs text-slate-300 font-bold truncate mb-1">${item.query}</p>
                    <p class="text-[10px] text-slate-500">${item.date} • ${item.time}s</p>
                </div>
            `).join('');
        }

        function loadHistoryItem(index) {
            const item = conversationHistory[index];
            document.getElementById('searchInput').value = item.query;
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('responseTime').innerText = `⏱️ ${item.time} ثانية • ${item.model.split('/')[1]}`;
            renderMarkdown(item.response);
            toggleHistory();
        }

        function toggleHistory() {
            document.getElementById('historySidebar').classList.toggle('open');
        }

        function clearHistory() {
            conversationHistory = [];
            localStorage.removeItem('shatter_history');
            renderHistory();
            showToast('تم مسح السجل يا صاحبي! 🗑️');
        }

        // Keyboard shortcuts
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                executeSearch();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('historySidebar').classList.remove('open');
            }
            if (e.ctrlKey && e.key === 'h') {
                e.preventDefault();
                toggleHistory();
            }
        });

        // Initialize
        renderHistory();
        document.getElementById('searchInput').focus();
    </script>
</body>
</html>
