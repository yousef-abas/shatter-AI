<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatter Search | ذكاء اصطناعي حقيقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #030712; color: #f3f4f6; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8 bg-gradient-to-b from-slate-950 to-slate-900 min-h-screen relative">

    <!-- هيدر نظيف وراقص يوضح إن السيستم شغال لايف -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-4 text-xs">
        <span class="flex items-center gap-1.5 text-slate-500">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> المحرك متصل ومستعد 🚀
        </span>
        <span class="text-slate-600 font-bold">بدون مفاتيح | جاهز للعمل</span>
    </header>

    <!-- الجزء الرئيسي -->
    <main class="w-full max-w-3xl space-y-8 z-10 my-auto text-center flex-grow flex flex-col justify-center">
        
        <!-- اللوجو -->
        <div>
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-slate-400">
                SHATTER SEARCH
            </h1>
            <p class="text-xs text-indigo-400 font-bold mt-2">محرك بحث ذكي حقيقي بيجاوب على أي حاجة في الكوكب 🧠</p>
        </div>

        <!-- شريط البحث السهل للناس -->
        <div class="w-full glass rounded-2xl p-2 shadow-2xl">
            <div class="flex items-center gap-2">
                <input type="text" id="searchInput" placeholder="اسأل عن أي حاجة في الكون (برمجة، طبخ، تاريخ)..." 
                    class="w-full bg-transparent py-4 px-4 outline-none text-sm md:text-base text-white placeholder-slate-500 font-medium text-right">
                <button onclick="executeSearch()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-4 rounded-xl text-xs md:text-sm font-bold transition-all whitespace-nowrap">
                    اسأل الذكاء 🚀
                </button>
            </div>
        </div>

        <!-- صندوق النتائج -->
        <div id="resultContainer" class="w-full hidden text-right">
            <div class="glass rounded-2xl p-6 md:p-8 shadow-xl">
                <p class="text-xs font-bold text-indigo-400 mb-4 border-b border-white/5 pb-2">✨ الرد الذكي المباشر:</p>
                <div id="responseText" class="text-sm md:text-base text-slate-200 leading-relaxed space-y-2"></div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center text-[11px] text-slate-600 mt-8">
        Shatter Search Pro | Developed by Youssef Abbas © 2026
    </footer>

    <script>
        async function executeSearch() {
            var query = document.getElementById('searchInput').value.trim();

            if (!query) {
                alert("اكتب سؤالك الأول يا صاحبي! 😉");
                return;
            }

            // إظهار التحميل للعميل
            document.getElementById('resultContainer').classList.remove('hidden');
            document.getElementById('responseText').innerHTML = `
                <div class="animate-pulse text-slate-400 text-xs">
                    بص بقا.. بنفكر في الإجابة حالاً وبنجهز لك الرد الحقيقي.. ثواني كدا...
                </div>`;

            try {
                // بنكلم سيرفر خارجي مجاني تماماً بيشغل موديلات قوية ومفتوحة بدون أي مفاتيح
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        // بنستخدم موديل هيركوليس أو لاما السريع والمجاني للعامة
                        model: 'meta-llama/llama-3-8b-instruct:free', 
                        messages: [
                            {
                                role: 'system',
                                content: 'You must ALWAYS reply in friendly, street-smart Egyptian slang (العامية المصرية). Keep answers extremely helpful, clear, and professional, but tone it exactly like a clever Egyptian developer talking to his close friend. Use structured lists, bold text, and phrases like "يا حبيب أخوك", "بص بقا", "يا صاحبي", "ركز معايا".'
                            },
                            {
                                role: 'user',
                                content: query
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0].message) {
                    let aiText = data.choices[0].message.content;
                    renderText(aiText);
                } else {
                    throw new Error("السيرفر العام مشغول حالياً");
                }

            } catch (error) {
                // لو السيرفر المجاني مهنج، بنشغل خطة بديلة سريعة عشان الموقع ميبوظش قدام الناس
                fallbackSearch(query);
            }
        }

        // خطة بديلة ذكية لو السيرفر الأساسي عليه ضغط
        async function fallbackSearch(query) {
            try {
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
                const data = await response.json();
                
                let text = data.AbstractText;
                if (!text && data.RelatedTopics && data.RelatedTopics.length > 0) {
                    text = data.RelatedTopics[0].Text;
                }
                
                if (text) {
                    renderText(`بص يا صاحبي، السيرفر عليه ضغط بس أنا جبتلك الخلاصة: **${text}**`);
                } else {
                    renderText("يا حبيب أخوك، السيرفرات المجانية مريحة شوية دلوقتي، جرب تسأل تاني كمان ثواني وهتظبط مع الموديل!");
                }
            } catch(e) {
                renderText("حصل قفلة في الشبكة يا حبيب أخوك، جرب تدوس على الزرار تاني حالاً!");
            }
        }

        function renderText(text) {
            let formatted = text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/```(.*?)\n([\s\S]*?)```/g, '<pre class="bg-slate-950 p-4 rounded-xl font-mono text-xs text-indigo-300 my-3 overflow-x-auto border border-white/5 select-all text-left">$2</pre>');
            
            document.getElementById('responseText').innerHTML = formatted;
        }

        // تشغيل بالـ Enter
        document.getElementById('searchInput').addEventListener("keypress", function(e) {
            if (e.key === "Enter") executeSearch();
        });
    </script>
</body>
</html>
